<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - احصل على حسابك المجاني</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14b4/web/SA-ar-20220502-popsignuptwoweeks-perspective_alpha_website_large.jpg');
            background-size: cover;
            background-position: center;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px 20px;
            border-radius: 10px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid #e50914;
        }

        .logo {
            color: #e50914;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background-color: #e50914;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.2s, background-color 0.2s;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        .btn:hover {
            background-color: #f6121d;
            transform: scale(1.05);
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }

        .offers-left {
            color: #ffcc00;
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }

        /* تنسيق عداد المشاهدات */
        .visitor-count {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">NETFLIX</div>
        <h1>عرض خاص: حسابات Premium مجانية</h1>
        <p>بمناسبة التحديث الجديد، نقدم 500 حساب نتفليكس بريميوم مجاناً لمدة سنة. اضغط على الزر أدناه لتفعيل حسابك الآن!</p>
        
        <a href="https://www.profitablecpmratenetwork.com/t069fu2ze0?key=9d8f8a55f4b631aeff00be0d9ffa2053" class="btn">احصل على الحساب الآن</a>

        <span class="offers-left">متبقي 14 حساباً فقط!</span>

        <div class="visitor-count">
            عدد المستفيدين من العرض حتى الآن: 
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fgithub.com%2FHe2456%2Fnetflix&count_bg=%23E50914&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=views&edge_flat=false" alt="Views"/>
        </div>

        <div class="footer-note">
            * هذا العرض متاح لفترة محدودة. يتطلب التفعيل التحقق من الهوية.
        </div>
    </div>

</body>
</html>
